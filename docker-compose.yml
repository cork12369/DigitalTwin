services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digital_twin}
      POSTGRES_USER: ${POSTGRES_USER:-digital_twin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digital_twin_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digital_twin} -d ${POSTGRES_DB:-digital_twin}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://digital_twin:digital_twin_dev_password@db:5432/digital_twin
      APP_SECRET_KEY: change-me-in-production
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:-change-me-admin-api-secret}
      CORS_ORIGINS: http://localhost:3000
      PUBLIC_WEB_URL: http://localhost:3000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_UTILITY_MODEL: ${OPENROUTER_UTILITY_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Digital Twin Prototype}
      OPENVIKING_BASE_URL: ${OPENVIKING_BASE_URL:-}
      OPENVIKING_API_KEY: ${OPENVIKING_API_KEY:-}
      OPENVIKING_TIMEOUT_SECONDS: ${OPENVIKING_TIMEOUT_SECONDS:-20}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_INTERNAL_BASE_URL: http://api:8000
      ADMIN_PANEL_PASSWORD: ${ADMIN_PANEL_PASSWORD:-change-me-admin-password}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-admin-session-secret}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      ADMIN_API_SECRET: ${ADMIN_API_SECRET:-change-me-admin-api-secret}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
